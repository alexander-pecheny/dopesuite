<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ведущий · Фест</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script defer src="/static/fest-grid.js"></script>
  <script defer src="/static/match-table.js"></script>
  <script defer src="/static/host.js"></script>
</head>
<body class="host ek-page">
  <header class="host-top ek-host-top">
    <div class="ek-header-main">
      <nav class="game-breadcrumbs" id="gameBreadcrumbs" aria-label="Навигация"></nav>
      <nav class="match-tabs ek-tabs" id="ekTabs" role="tablist"></nav>
    </div>
    <div class="host-actions">
      <span class="sync-status" id="status" data-state="syncing" aria-label="Синхронизация" title="Синхронизация"></span>
      <a class="action-icon viewer-link" href="/" target="_blank" rel="noreferrer" aria-label="Открыть зрительскую страницу" title="Открыть зрительскую страницу">👀</a>
    </div>
  </header>

  <main class="match-main">
    <div class="sheet-frame fight-frame">
      <div id="hostTable" class="table-host"></div>
    </div>
  </main>
</body>
</html>
